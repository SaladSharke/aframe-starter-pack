<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 1.25 -5" radius="1.0" color="#FFFFFF"></a-sphere>
      <a-sphere position="0 2.25 -5" radius="0.75" color="#FFFFFF"></a-sphere>
      <a-sphere position="0 3.25 -5" radius="0.6" color="#FFFFFF"></a-sphere>
      <a-cylinder position="0 3.8 -5" radius="0.5" height="0.05" color="#000000"></a-cylinder>
      <a-cylinder position="0 4.0 -5" radius="0.35" height="0.4" color="#000000"></a-cylinder>
      <a-cylinder position="0 3.3 -4.3" radius="0.05" height="0.3" rotation="90 0 0" color="#FF8C00"></a-cylinder>
      
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="40" height="40" color="#EEEEEE"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: japan; dressingAmount: 2"></a-entity>
    </a-scene>
  </body>
</html>
